<html lang="ko">

<meta charset="UTF-8">

<title>시흥시 시민행복텃밭 농작물 캘린더</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f0e8; color: #3a2e1e; min-height: 100vh; }
 
  header {
    background: linear-gradient(135deg, #4a7c3f, #6aab5e);
    color: white;
    padding: 24px 20px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 1.8rem; font-weight: 700; }
  header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
 
  .weather-loading { font-size: 0.85rem; color: #888; padding: 14px; text-align: center; }
 
  .weather-section {
    background: #eaf3f8;
    border-bottom: 1px solid #c8dcea;
    padding: 14px 16px;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .weather-card {
    background: white;
    border-radius: 18px;
    padding: 12px 22px;
    min-width: 155px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    border: 1px solid #dde8f0;
  }
  .weather-card .w-icon { font-size: 2.2rem; line-height: 1; flex-shrink: 0; }
  .weather-card .w-info { display: flex; flex-direction: column; gap: 3px; }
  .weather-card .w-day { font-size: 0.84rem; font-weight: 700; color: #3a6aaa; }
  .weather-card .w-desc { font-size: 0.78rem; color: #666; }
  .weather-card .w-temp { font-size: 0.88rem; font-weight: 600; color: #333; }
  .weather-card .w-temp span { font-weight: 400; color: #999; }
 
  .month-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    flex-wrap: wrap;
  }
  .month-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid #c8dfc4;
    background: white;
    color: #4a7c3f;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .month-btn:hover { background: #e8f5e2; }
  .month-btn.active { background: #4a7c3f; color: white; border-color: #4a7c3f; }
 
  .season-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    flex-wrap: wrap;
  }
  .season-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .season-tab[data-season="봄"] { background: #fef0f5; color: #c25f8a; border-color: #f0b8d0; }
  .season-tab[data-season="봄"].active { background: #c25f8a; color: white; }
  .season-tab[data-season="여름"] { background: #edf7ed; color: #3a8c3a; border-color: #a8d8a8; }
  .season-tab[data-season="여름"].active { background: #3a8c3a; color: white; }
  .season-tab[data-season="가을"] { background: #fff5e8; color: #c87020; border-color: #f0c080; }
  .season-tab[data-season="가을"].active { background: #c87020; color: white; }
  .season-tab[data-season="겨울"] { background: #eef3fa; color: #3a6aaa; border-color: #a8c0e8; }
  .season-tab[data-season="겨울"].active { background: #3a6aaa; color: white; }
 
  .current-info {
    text-align: center;
    padding: 10px;
    font-size: 0.95rem;
    color: #666;
  }
  .current-info strong { color: #4a7c3f; font-size: 1.1rem; }
 
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 14px;
    border: 1.5px solid #c8dfc4;
    background: white;
    color: #4a7c3f;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active { background: #4a7c3f; color: white; border-color: #4a7c3f; }
 
  .veggie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    padding: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }
 
  .veggie-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-left: 5px solid #aaa;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .veggie-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
  .veggie-card.highlight { border-left-color: #f5a623; background: #fffbf0; }
 
  .veggie-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .crop-emoji { font-size: 2rem; }
  .crop-name { font-size: 1.05rem; font-weight: 700; }
  .crop-category { font-size: 0.75rem; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
 
  .timeline-row { margin: 6px 0; }
  .timeline-label { font-size: 0.75rem; color: #888; margin-bottom: 3px; }
  .timeline-bar {
    display: flex;
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    background: #f0f0f0;
  }
  .timeline-segment { height: 100%; transition: opacity 0.2s; }
 
  .legend {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
 
  .tip-box {
    background: #fffbf0;
    border: 1px solid #f0d080;
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: #7a5a10;
  }
  .extra-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }
  .caution-box {
    background: #fff5f5;
    border: 1px solid #f5b8b8;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.78rem;
    color: #a03030;
  }
  .hint-box {
    background: #f0f8ff;
    border: 1px solid #a8d0f0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.78rem;
    color: #1a5a8a;
  }
  .sow-box {
    background: #f5f0ff;
    border: 1px solid #c8a8f0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.78rem;
    color: #5a2a8a;
  }
 
  .month-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: #aaa;
    padding: 0 2px;
    margin-top: 2px;
  }
 
  .no-result {
    text-align: center;
    padding: 40px;
    color: #aaa;
    font-size: 1rem;
    grid-column: 1/-1;
  }
 
  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: #999;
    margin-top: 20px;
  }
</style>

const WMO = {
  0:'맑음', 1:'대체로 맑음', 2:'구름 조금', 3:'흐림',
  45:'안개', 48:'안개',
  51:'이슬비', 53:'이슬비', 55:'이슬비',
  61:'비', 63:'비', 65:'강한 비',
  71:'눈', 73:'눈', 75:'강한 눈',
  80:'소나기', 81:'소나기', 82:'강한 소나기',
  95:'뇌우', 96:'뇌우', 99:'뇌우'
};
const WMO_ICON = {
  0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️',
  45:'🌫', 48:'🌫',
  51:'🌦', 53:'🌦', 55:'🌧',
  61:'🌧', 63:'🌧', 65:'🌧',
  71:'🌨', 73:'❄️', 75:'❄️',
  80:'🌦', 81:'🌧', 82:'⛈',
  95:'⛈', 96:'⛈', 99:'⛈'
};
 
async function loadWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude=37.3797&longitude=126.8031' +
      '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max' +
      '&timezone=Asia%2FSeoul&forecast_days=2';
    const res = await fetch(url);
    const d = await res.json();
    const days = d.daily;
    const labels = ['오늘', '내일'];
    const cards = labels.map((label, i) => {
      const code = days.weathercode[i];
      const icon = WMO_ICON[code] || '🌡';
      const desc = WMO[code] || '알 수 없음';
      const max = Math.round(days.temperature_2m_max[i]);
      const min = Math.round(days.temperature_2m_min[i]);
      const rain = days.precipitation_probability_max[i];
      const now = new Date();
      const target = new Date(now);
      target.setDate(now.getDate() + i);
      const mo = target.getMonth()+1, da = target.getDate();
      return `<div class="weather-card">
        <div class="w-icon">${icon}</div>
        <div class="w-info">
          <div class="w-day">${label} (${mo}/${da})</div>
          <div class="w-desc">${desc} · ${max}° <span>/ ${min}°</span></div>
          <div class="w-temp">🌂 강수 ${rain}%</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('weatherBar').outerHTML =
      `<div class="weather-section" id="weatherBar">${cards}</div>`;
  } catch(e) {
    document.getElementById('weatherBar').innerHTML =
      '<div class="weather-loading">🌤 날씨 정보를 불러올 수 없습니다</div>';
  }
}
loadWeather();

    sowMethod:'직파(씨앗). 5mm 깊이 줄뿌림. 솎아가며 최종 15~20cm 간격으로 키워요.' },

let currentMonth = new Date().getMonth() + 1;
if (![4,5,6,7,8,9,10,11].includes(currentMonth)) currentMonth = 4;
let selectedSeason = '전체';
let selectedCat = '전체';
 
function getSeasonForMonth(m) {
  if ([3,4,5].includes(m)) return '봄';
  if ([6,7,8].includes(m)) return '여름';
  if ([9,10,11].includes(m)) return '가을';
  return '겨울';
}
 
function buildMonthNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = NAV_MONTHS.map(mo => {
    const m = MONTHS[mo-1];
    const season = getSeasonForMonth(mo);
    const colors = { '봄':'#c25f8a','여름':'#3a8c3a','가을':'#c87020','겨울':'#3a6aaa' };
    return `<button class="month-btn ${mo===currentMonth?'active':''}" 
      style="${mo===currentMonth?`background:${colors[season]};border-color:${colors[season]};color:white`:''};"
      onclick="selectMonth(${mo})">${m}</button>`;
  }).join('');
}
 
function buildInfo() {
  const season = getSeasonForMonth(currentMonth);
  const seasonEmoji = { '봄':'🌸','여름':'☀️','가을':'🍂','겨울':'❄️' };
  document.getElementById('currentInfo').innerHTML =
    `현재 선택: <strong>${currentMonth}월 (${seasonEmoji[season]} ${season})</strong> — 이 시기에 맞는 농작물을 확인하세요`;
}
 
function buildSeasonTabs() {
  document.querySelectorAll('.season-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.season === selectedSeason);
  });
}
 
function getStatusForMonth(crop, month) {
  if (crop.harvest.includes(month)) return 'harvest';
  if (crop.grow.includes(month)) return 'grow';
  if (crop.sow.includes(month)) return 'sow';
  return null;
}
 
// 채소 관리카드 타임라인: 4~11월만 표시
const BAR_MONTHS = [4,5,6,7,8,9,10,11];
 
function buildBar(crop) {
  const colors = { sow:'#80c980', grow:'#4a9c4a', harvest:'#e07830', rest:'#f0f0f0' };
  const segWidth = (100/BAR_MONTHS.length).toFixed(2) + '%';
  const segs = BAR_MONTHS.map(m => getStatusForMonth(crop, m));
  return `<div class="timeline-bar">
    ${segs.map((s,i) => {
      const mo = BAR_MONTHS[i];
      return `<div class="timeline-segment"
        style="width:${segWidth};background:${colors[s]};${mo===currentMonth?'outline:2px solid #333;z-index:1;':''}"
        title="${mo}월: ${s==='sow'?'파종':s==='grow'?'재배':s==='harvest'?'수확':'휴식'}"></div>`;
    }).join('')}
  </div>
  <div class="month-labels">
    ${BAR_MONTHS.map(m=>`<span>${m}</span>`).join('')}
  </div>`;
}
 
function buildVeggieCards() {
  const grid = document.getElementById('veggieGrid');
  const catColors = { '채소':'#4a7c3f','과일':'#c83030','곡류':'#c87020','뿌리':'#8a5020' };
 
  let filtered = crops.filter(c => {
    const catOk = selectedCat === '전체' || c.cat === selectedCat;
    const seasonOk = selectedSeason === '전체' || c.season.includes(selectedSeason);
    return catOk && seasonOk;
  });
 
  const status = filtered.map(c => ({ crop: c, status: getStatusForMonth(c, currentMonth) }));
  status.sort((a,b) => {
    const order = { harvest:0, sow:1, grow:2, null:3 };
    return order[a.status] - order[b.status];
  });
 
  if (status.length === 0) {

        ${st === 'grow' ? `<span style="margin-left:auto;display:flex;flex-direction:column;align-items:center;gap:2px;"><svg width="52" height="52" viewBox="0 0 140 120" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">

  <path d="M88,58 Q98,54 106,56 Q112,58 110,64 Q108,70 100,70 Q90,70 86,64 Z" fill="#88b8d8"/>

  <!-- 해돌이 -->

  <path d="M125,63 Q136,74 147,63" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>

function selectMonth(m) {
  currentMonth = m;
  render();
}
 
function render() {
  buildMonthNav();
  buildInfo();
  buildSeasonTabs();
  buildVeggieCards();
}
 
document.getElementById('seasonTabs').addEventListener('click', e => {
  const tab = e.target.closest('.season-tab');
  if (!tab) return;
  selectedSeason = tab.dataset.season;
  render();
});
 
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  selectedCat = btn.dataset.cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === selectedCat));
  buildVeggieCards();
});
 
render();
</script>
</body>
</html>
